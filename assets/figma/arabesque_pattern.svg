<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1080 2400"
     preserveAspectRatio="none">
  <!--
    Tileable 128×128 Arabesque carved-wood motif.
    viewBox 1080×2400 covers the tallest phone ratio (20:9 at 1080p).
    preserveAspectRatio="none" + Flutter BoxFit.fill stretches this to
    fill any screen exactly, so the tile density stays consistent
    whether the device is 4:3, 16:9, 18:9, 19.5:9 or 20:9.
    Tile count: ~8.4 wide × ~18.75 tall (dense, like the Figma original).
  -->
  <defs>
    <pattern id="arabesque-tile" x="0" y="0" width="128" height="128"
             patternUnits="userSpaceOnUse">

      <!-- Outer border frame -->
      <rect x="1.5" y="1.5" width="125" height="125"
            fill="none" stroke="#FFF" stroke-width="0.4"/>

      <!-- Main 8-pointed star (16-vertex polygon) -->
      <polygon points="64,25 75,36 92,36 92,53
                       103,64 92,75 92,92 75,92
                       64,103 53,92 36,92 36,75
                       25,64 36,53 36,36 53,36"
               fill="none" stroke="#FFF" stroke-width="1.3"
               stroke-linejoin="miter"/>

      <!-- Inner octagon -->
      <polygon points="53,36 75,36 92,53 92,75 75,92 53,92 36,75 36,53"
               fill="none" stroke="#FFF" stroke-width="0.65"/>

      <!-- Centre mini star -->
      <polygon points="64,53 71,56 74,64 71,72 64,75 57,72 54,64 57,56"
               fill="none" stroke="#FFF" stroke-width="0.5"/>

      <!-- Centre dot -->
      <circle cx="64" cy="64" r="1.5" fill="#FFF"/>

      <!-- Cardinal connector bands (tile edges) -->
      <line x1="64" y1="25"  x2="64"  y2="0"   stroke="#FFF" stroke-width="0.55"/>
      <line x1="103" y1="64" x2="128" y2="64"   stroke="#FFF" stroke-width="0.55"/>
      <line x1="64" y1="103" x2="64"  y2="128"  stroke="#FFF" stroke-width="0.55"/>
      <line x1="25" y1="64"  x2="0"   y2="64"   stroke="#FFF" stroke-width="0.55"/>

      <!-- Diagonal connector bands (tile corners) -->
      <line x1="36" y1="36"  x2="0"   y2="0"    stroke="#FFF" stroke-width="0.55"/>
      <line x1="92" y1="36"  x2="128" y2="0"    stroke="#FFF" stroke-width="0.55"/>
      <line x1="92" y1="92"  x2="128" y2="128"  stroke="#FFF" stroke-width="0.55"/>
      <line x1="36" y1="92"  x2="0"   y2="128"  stroke="#FFF" stroke-width="0.55"/>

      <!-- Half-diamond accents at tile-edge midpoints -->
      <line x1="58" y1="0"   x2="64" y2="8"   stroke="#FFF" stroke-width="0.45"/>
      <line x1="70" y1="0"   x2="64" y2="8"   stroke="#FFF" stroke-width="0.45"/>
      <line x1="58" y1="128" x2="64" y2="120" stroke="#FFF" stroke-width="0.45"/>
      <line x1="70" y1="128" x2="64" y2="120" stroke="#FFF" stroke-width="0.45"/>
      <line x1="0"  y1="58"  x2="8"  y2="64"  stroke="#FFF" stroke-width="0.45"/>
      <line x1="0"  y1="70"  x2="8"  y2="64"  stroke="#FFF" stroke-width="0.45"/>
      <line x1="128" y1="58" x2="120" y2="64" stroke="#FFF" stroke-width="0.45"/>
      <line x1="128" y1="70" x2="120" y2="64" stroke="#FFF" stroke-width="0.45"/>

      <!-- Ornament dots in kite-shaped negative spaces -->
      <circle cx="79" cy="29" r="1.2" fill="#FFF"/>
      <circle cx="99" cy="47" r="1.2" fill="#FFF"/>
      <circle cx="99" cy="81" r="1.2" fill="#FFF"/>
      <circle cx="79" cy="99" r="1.2" fill="#FFF"/>
      <circle cx="49" cy="99" r="1.2" fill="#FFF"/>
      <circle cx="29" cy="81" r="1.2" fill="#FFF"/>
      <circle cx="29" cy="47" r="1.2" fill="#FFF"/>
      <circle cx="49" cy="29" r="1.2" fill="#FFF"/>

      <!-- Crosshatch depth lines -->
      <line x1="53" y1="36" x2="53" y2="53" stroke="#FFF" stroke-width="0.3"/>
      <line x1="75" y1="36" x2="75" y2="53" stroke="#FFF" stroke-width="0.3"/>
      <line x1="75" y1="75" x2="75" y2="92" stroke="#FFF" stroke-width="0.3"/>
      <line x1="53" y1="75" x2="53" y2="92" stroke="#FFF" stroke-width="0.3"/>
      <line x1="36" y1="53" x2="53" y2="53" stroke="#FFF" stroke-width="0.3"/>
      <line x1="36" y1="75" x2="53" y2="75" stroke="#FFF" stroke-width="0.3"/>
      <line x1="75" y1="53" x2="92" y2="53" stroke="#FFF" stroke-width="0.3"/>
      <line x1="75" y1="75" x2="92" y2="75" stroke="#FFF" stroke-width="0.3"/>
    </pattern>
  </defs>

  <!-- Fill the entire canvas with the tiled pattern -->
  <rect width="1080" height="2400" fill="url(#arabesque-tile)"/>
</svg>
